<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0"> <!-- 👈 ici -->
    <title>Santoral Misericordia - Detalle</title>
    <link href="https://fonts.googleapis.com/css2?family=Lekton&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/toastify-js/src/toastify.min.css">
    <script src="https://cdn.jsdelivr.net/npm/toastify-js"></script>
</head>

<body>
    <header>
        <h1 class="titre">Santoral Misericordia</h1>
        <a href="index.html"><img src="media/logomisericordia.png" alt="Logo Misericordia" class="logo"></a>
    </header>
    <div class="header" , style="margin:0px 4vw 4vw;">
        <!-- <div class="arrow arrow-left" id="prev"></div> -->
        <div id="prev" style="font-size: 30px;font-weight: bold;">&lt;</div>
        <h2 id="dateLongue"></h2>
        <!-- <div class="arrow arrow-right" id="next"></div> -->
        <div id="next" style="font-size: 30px;font-weight: bold;">&gt;</div>
    </div>

    <div id="contenu-container">
        <div id="contenu-slider" style="display: flex; transition: transform 0.3s;">
            <div id="contenu-prev"></div>
            <div id="contenu-current"></div>
            <div id="contenu-next"></div>
        </div>
    </div>

    <div id="editFormContainer" style="display:none;">
        <form id="editForm" style="margin-bottom :10px;">
            <div id="inputsContainer"></div>
            <!-- <textarea id="jsonInput" rows="10" cols="50" style="width :90vw;"></textarea> -->
            <button type="submit">Guardar</button>
            <button type="button" id="cancelBtn">Cancelar</button>
        </form>
    </div>

    <!-- Bouton édition : discret, coin haut droit de la page -->
    <button id="editBtn" class="edit-fab" title="Editar" aria-label="Edition"></button>

    <!-- Barre fixe en bas : retour + sélecteur pays + aujourd'hui -->
    <div class="bottom-bar" id="bottom-bar">
        <button class="bar-btn" id="back" aria-label="Retour"></button>
        <div class="country-select" id="country-select"></div>
        <button class="bar-btn" id="today">Hoy</button>
    </div>
</body>
<script src="js/detail.js"></script>

</body>


</html>
